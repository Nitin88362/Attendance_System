<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #2563eb;
            --btn-blue: #1d4ed8;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Container */
        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 1050px;
            display: flex;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            min-height: 600px;
        }

        /* Left Branding Side */
        .branding-side {
            flex: 1.2;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .brand-text h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1e1b4b;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .brand-text h1 span { color: var(--primary-blue); }
        .brand-text p { color: var(--text-muted); font-size: 1.1rem; max-width: 300px; }

        .illustration { width: 100%; text-align: center; margin-top: 30px; }
        .illustration img { 
            width: 100%; 
            max-width: 550px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }

        .illustration img:hover {
            transform: scale(1.02);
        }

        /* Right Form Side */
        .form-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow-y: auto;
        }

        /* Header */
        .login-header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            padding: 30px 30px;
            text-align: center;
            color: white;
        }

        .user-icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 15px;
        }

        .login-header h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 5px; }
        .login-header p { font-size: 0.9rem; opacity: 0.9; }

        /* Form Section */
        .form-section {
            padding: 20px 30px;
        }

        .form-group { margin-bottom: 15px; position: relative; }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 48px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group i {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .pass-toggle {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%); cursor: pointer; color: var(--text-muted);
        }

        /* Options */
        .form-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; font-size: 0.9rem;
        }
        .remember { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; }
        .forgot { color: var(--primary-blue); text-decoration: none; font-weight: 600; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-login:hover { background: var(--btn-blue); transform: translateY(-1px); }

        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Alert Styles */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 0;
        }

        .stat-item {
            text-align: center;
            padding: 10px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .stat-item i {
            font-size: 1.2rem;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }

        .stat-item .label {
            font-size: 0.65rem;
            color: var(--text-muted);
            display: block;
        }

        .stat-item .value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Footer */
        .login-footer {
            padding: 15px 30px;
            text-align: center;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .admin-link {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .admin-link a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }

        /* Quick Stats */
        .quick-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8fafc;
            border-radius: 12px;
        }

        .stat-item i {
            font-size: 1.5rem;
            color: var(--primary-blue);
            margin-bottom: 8px;
        }

        .stat-item .label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
        }

        .stat-item .value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-dark);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="branding-side">
            <div class="brand-text">
                <h1>Employee<br>Attendance<br><span>System</span></h1>
                <p>Smart Attendance Solution for Modern Workplaces</p>
            </div>
            <div class="illustration">
                <img src="https://www.lystloc.com/blog/wp-content/uploads/2024/09/attendance-management-features.webp" alt="Attendance Management Features">
            </div>
        </div>

        <div class="form-side">
            <div class="login-header">
                <div class="user-icon">
                    <i class="fas fa-user"></i>
                </div>
                <h2>Employee Login</h2>
                <p>Welcome! Please login to your account.</p>
            </div>

            <div class="form-section">
                <div class="alert alert-error" id="errorAlert"></div>
                <div class="alert alert-success" id="successAlert"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <i class="far fa-id-badge"></i>
                        <input type="text" id="employeeId" placeholder="Employee ID" required>
                    </div>

                    <div class="form-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                        <i class="far fa-eye pass-toggle" id="togglePassword"></i>
                    </div>

                    <div class="form-footer">
                        <label class="remember">
                            <input type="checkbox" id="rememberMe"> Remember Me
                        </label>
                        <a href="#" class="forgot" onclick="alert('Please contact HR for password reset')">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> 
                        <span id="loginText">Login</span>
                        <div class="spinner" id="loginSpinner"></div>
                    </button>
                </form>

                <div class="quick-stats" id="quickStats">
                    <div class="stat-item">
                        <i class="fas fa-users"></i>
                        <span class="label">Total Employees</span>
                        <span class="value" id="totalEmployees">--</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-user-check"></i>
                        <span class="label">Present Today</span>
                        <span class="value" id="presentToday">--</span>
                    </div>
                    <div class="stat-item">
                        <i class="fas fa-clock"></i>
                        <span class="label">Current Time</span>
                        <span class="value" id="currentTime">--:--</span>
                    </div>
                </div>
            </div>

            <div class="login-footer">
                <div class="admin-link">
                    Are you an administrator? <a href="/">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Update current time
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: false 
            });
            document.getElementById('currentTime').textContent = timeString;
        }

        updateTime();
        setInterval(updateTime, 1000);

        // Load quick stats
        async function loadQuickStats() {
            try {
                const response = await fetch('/api/attendance/today/summary');
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('totalEmployees').textContent = data.summary.total_employees;
                    document.getElementById('presentToday').textContent = data.summary.present_today;
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        loadQuickStats();
        setInterval(loadQuickStats, 30000); // Update every 30 seconds

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const employeeId = document.getElementById('employeeId').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Show loading state
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            
            // Hide alerts
            hideAlerts();
            
            try {
                const response = await fetch('/api/auth/employee/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ employee_id: employeeId, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token and user data
                    if (rememberMe) {
                        localStorage.setItem('employeeToken', data.token);
                        localStorage.setItem('employeeId', data.user.employee_id);
                        localStorage.setItem('employeeUser', JSON.stringify(data.user));
                    } else {
                        sessionStorage.setItem('employeeToken', data.token);
                        sessionStorage.setItem('employeeId', data.user.employee_id);
                        sessionStorage.setItem('employeeUser', JSON.stringify(data.user));
                    }
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to employee dashboard
                    setTimeout(() => {
                        window.location.href = '/employee-dashboard';
                    }, 1500);
                } else {
                    showError(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please try again.');
            } finally {
                // Hide loading state
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
            }
        });

        // Alert functions
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(hideAlerts, 5000);
        }

        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            successAlert.textContent = message;
            successAlert.style.display = 'block';
            setTimeout(hideAlerts, 5000);
        }

        function hideAlerts() {
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
        }

        // Check if user is already logged in
        window.addEventListener('load', function() {
            const token = localStorage.getItem('employeeToken') || sessionStorage.getItem('employeeToken');
            if (token) {
                window.location.href = '/employee-dashboard';
            }
        });
    </script>
</body>
</html>
