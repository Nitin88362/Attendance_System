<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Employee Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #4f46e5;
            --btn-blue: #4338ca;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Main Container */
        .login-card {
            background: var(--white);
            width: 100%;
            max-width: 1050px;
            display: flex;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            min-height: 600px;
        }

        /* Left Branding Side */
        .branding-side {
            flex: 1.2;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
        }

        .brand-text h1 {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1e1b4b;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .brand-text h1 span { color: var(--primary-blue); }
        .brand-text p { color: var(--text-muted); font-size: 1.1rem; max-width: 300px; }

        .illustration { width: 100%; text-align: center; margin-top: 30px; }
        .illustration img { 
            width: 100%; 
            max-width: 550px; 
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
        }

        .illustration img:hover {
            transform: scale(1.02);
        }

        /* Right Form Side */
        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: white;
        }

        .login-header { text-align: center; margin-bottom: 40px; }
        .icon-box {
            width: 75px; height: 75px;
            background: #eef2ff;
            color: var(--primary-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .login-header h2 { font-size: 1.8rem; font-weight: 700; color: var(--text-dark); }
        .login-header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 8px; }

        /* Inputs */
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 15px 15px 15px 48px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .pass-toggle {
            position: absolute; right: 16px; top: 50%;
            transform: translateY(-50%); cursor: pointer; color: var(--text-muted);
        }

        /* Options */
        .form-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; font-size: 0.9rem;
        }
        .remember { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; }
        .forgot { color: var(--primary-blue); text-decoration: none; font-weight: 600; }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-login:hover { background: var(--btn-blue); transform: translateY(-1px); }

        .btn-login:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center; margin: 25px 0; position: relative;
        }
        .divider::before {
            content: ""; position: absolute; width: 100%; height: 1px;
            background: var(--border); left: 0; top: 50%; z-index: 1;
        }
        .divider span {
            background: white; padding: 0 15px; position: relative; z-index: 2;
            color: var(--text-muted); font-size: 0.85rem;
        }

        .security-note {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; color: var(--text-muted); font-size: 0.9rem;
        }

        /* Alert Styles */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 900px) {
            .branding-side { display: none; }
            .login-card { max-width: 480px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="branding-side">
            <div class="brand-text">
                <h1>Employee<br>Attendance<br><span>System</span></h1>
                <p>Smart Attendance Solution for Modern Workplaces</p>
            </div>
            <div class="illustration">
                <img src="https://www.lystloc.com/blog/wp-content/uploads/2024/09/attendance-management-features.webp" alt="Attendance Management Features">
            </div>
        </div>

        <div class="form-side">
            <div class="login-header">
                <div class="icon-box">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2>Admin Login</h2>
                <p>Welcome back! Please login to your account.</p>
            </div>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <i class="far fa-user"></i>
                    <input type="text" id="username" placeholder="Username" required>
                </div>

                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                    <i class="far fa-eye pass-toggle" id="togglePassword"></i>
                </div>

                <div class="form-footer">
                    <label class="remember">
                        <input type="checkbox" id="rememberMe"> Remember Me
                    </label>
                    <a href="#" class="forgot" onclick="alert('Please contact system administrator for password reset')">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> 
                    <span id="loginText">Login</span>
                    <div class="spinner" id="loginSpinner"></div>
                </button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <span>Secure Admin Access</span>
            </div>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/employee-login" style="color: var(--primary-blue); text-decoration: none; font-size: 0.9rem;">
                    Employee Login →
                </a>
            </div>
        </div>
    </div>

    <script>
        // Password visibility toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            
            // Show loading state
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const loginSpinner = document.getElementById('loginSpinner');
            
            loginBtn.disabled = true;
            loginText.style.display = 'none';
            loginSpinner.style.display = 'inline-block';
            
            // Hide alerts
            hideAlerts();
            
            try {
                const response = await fetch('/api/auth/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Store token and user data
                    if (rememberMe) {
                        localStorage.setItem('adminToken', data.token);
                        localStorage.setItem('adminUser', JSON.stringify(data.user));
                    } else {
                        sessionStorage.setItem('adminToken', data.token);
                        sessionStorage.setItem('adminUser', JSON.stringify(data.user));
                    }
                    
                    showSuccess('Login successful! Redirecting...');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showError(data.message || 'Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                showError('Network error. Please try again.');
            } finally {
                // Hide loading state
                loginBtn.disabled = false;
                loginText.style.display = 'inline';
                loginSpinner.style.display = 'none';
            }
        });

        // Alert functions
        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            setTimeout(hideAlerts, 5000);
        }

        function showSuccess(message) {
            const successAlert = document.getElementById('successAlert');
            successAlert.textContent = message;
            successAlert.style.display = 'block';
            setTimeout(hideAlerts, 5000);
        }

        function hideAlerts() {
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
        }

        // Check if user is already logged in
        window.addEventListener('load', function() {
            const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
            if (token) {
                // Verify token is still valid (optional)
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
